name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DCM_CMS_API_BASE_URL: http://localhost:4000/api
      CMS_PUBLIC_API_KEY: ci-cms-public-api-key-please-change
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Generate SST types
        run: npx sst version >/dev/null

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
